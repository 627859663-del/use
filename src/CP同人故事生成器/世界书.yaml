        updatedAt: 2026-04-03T00:00:00.000Z

  - 名称: 一句话大纲/剧情开头
    启用: false
    激活策略:
      类型: 蓝灯
    插入位置:
      类型: 角色定义之前
      顺序: 103
    内容: |-
      - 一场本该擦肩而过的任务事故，让他们被迫共享同一个秘密。
      - 分离多年后重逢的那天，其中一人已经成了另一个人必须追捕的目标。
      - 他们在同一场葬礼上认出了彼此，却谁都不敢先叫出对方的名字。
      - 为了查清一桩旧案，他们假扮恋人潜入一座处处设防的城。
      - 末班列车停在不存在的站台时，只有他们两人还记得真实世界。
      - 一纸荒唐婚约把宿敌绑到一起，而反悔的代价比成亲更大。
      - 当预言说其中一人必须亲手杀死另一人，他们决定先骗过命运。
      - 他捡回来的不是落难旅人，而是曾经亲手背叛自己的旧爱。
    额外字段:
